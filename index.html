<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Runner</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }
        .game-container {
            width: 800px;
            height: 300px;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            background: url('https://i.ibb.co/30fL337/bg-final.png');
            background-size: auto 100%;
            animation: backgroundMove 10s linear infinite;
        }
        @keyframes backgroundMove {
            from { background-position-x: 0; }
            to { background-position-x: -800px; }
        }
        #character {
            width: 50px;
            height: 50px;
            background: url('https://i.ibb.co/L9H8b4f/char-final.png');
            background-size: contain;
            position: absolute;
            bottom: 0;
            left: 50px;
            transition: bottom 0.3s ease-out;
        }
        #obstacle {
            width: 40px;
            height: 40px;
            background: url('https://i.ibb.co/7g2j6XF/obs-final.png');
            background-size: contain;
            position: absolute;
            bottom: 0;
            right: -40px;
            animation: obstacleMove 2s linear infinite;
        }
        @keyframes obstacleMove {
            0% { right: -40px; }
            100% { right: 100%; }
        }
        .jump {
            animation: jump 0.5s ease-out;
        }
        @keyframes jump {
            0%, 100% { bottom: 0; }
            50% { bottom: 120px; }
        }
    </style>
</head>
<body>
    <audio id="jumpSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-video-game-jump-223.mp3" preload="auto"></audio>
    <audio id="hitSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-bling-2000.mp3" preload="auto"></audio>

    <div class="game-container">
        <div id="character"></div>
        <div id="obstacle"></div>
    </div>

    <script>
        const character = document.getElementById("character");
        const obstacle = document.getElementById("obstacle");
        const gameContainer = document.querySelector(".game-container");
        const jumpSound = document.getElementById("jumpSound");
        const hitSound = document.getElementById("hitSound");
        let isJumping = false;

        function jump() {
            if (isJumping) return;
            isJumping = true;
            jumpSound.currentTime = 0;
            jumpSound.play();
            character.classList.add("jump");
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 500);
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" || event.code === "ArrowUp") {
                jump();
            }
        });

        gameContainer.addEventListener("click", () => {
            jump();
        });

        const checkCollision = setInterval(() => {
            const characterRect = character.getBoundingClientRect();
            const obstacleRect = obstacle.getBoundingClientRect();

            if (
                characterRect.right > obstacleRect.left &&
                characterRect.left < obstacleRect.right &&
                characterRect.bottom > obstacleRect.top
            ) {
                hitSound.currentTime = 0;
                hitSound.play();
                alert("Game Over! The game will restart.");
                location.reload();
            }
        }, 10);
    </script>
</body>
</html>
