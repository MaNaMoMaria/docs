<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Escape</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
        }

        .game-container {
            width: 400px;
            height: 600px;
            border: 2px solid #fff;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a237e, #4a148c);
            cursor: crosshair;
        }

        #player {
            width: 40px;
            height: 60px;
            background-color: #e0f7fa;
            position: absolute;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            border-radius: 5px;
            box-shadow: 0 0 10px #e0f7fa, 0 0 20px #e0f7fa;
        }

        .bullet {
            width: 5px;
            height: 20px;
            background-color: #ff5252;
            position: absolute;
            top: -20px;
            box-shadow: 0 0 5px #ff5252, 0 0 10px #ff5252;
        }

        .game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 100;
            color: white;
            font-size: 2em;
        }

        .restart-button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            border: 2px solid white;
            background-color: #2196F3;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .restart-button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
