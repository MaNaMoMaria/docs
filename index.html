<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Game</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            width: 90%;
            max-width: 900px;
            height: 400px;
            border: 5px solid #333;
            position: relative;
            background: url('https://i.imgur.com/8Qj8n6K.gif');
            background-size: auto 100%;
            animation: backgroundMove 10s linear infinite;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            cursor: pointer;
        }
        @keyframes backgroundMove {
            from { background-position-x: 0; }
            to { background-position-x: -900px; }
        }
        #character {
            width: 80px;
            height: 80px;
            background: url('https://i.imgur.com/r6b3l04.gif') no-repeat center;
            background-size: contain;
            position: absolute;
            bottom: 0;
            left: 50px;
            transition: bottom 0.3s;
        }
        #obstacle {
            width: 70px;
            height: 70px;
            background: url('https://i.imgur.com/n14z22o.gif') no-repeat center;
            background-size: contain;
            position: absolute;
            bottom: 0;
            right: -70px;
            animation: moveObstacle 1.8s linear infinite;
        }
        @keyframes moveObstacle {
            0% { right: -70px; }
            100% { right: 100%; }
        }
        .jump {
            animation: jump 0.6s ease-out;
        }
        @keyframes jump {
            0%, 100% { bottom: 0; }
            50% { bottom: 150px; }
        }
        .hit-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0);
            transition: background-color 0.2s ease-in-out;
            pointer-events: none;
        }
        .game-over-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Arial', sans-serif;
            font-size: 3em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <audio id="jumpSound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" preload="auto"></audio>
    <audio id="hitSound" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" preload="auto"></audio>

    <div class="game-container">
        <div id="character"></div>
        <div id="obstacle"></div>
        <div id="hitEffect" class="hit-effect"></div>
        <div id="gameOverText" class="game-over-text">Game Over</div>
    </div>

    <script>
        const character = document.getElementById("character");
        const obstacle = document.getElementById("obstacle");
        const gameContainer = document.querySelector(".game-container");
        const jumpSound = document.getElementById("jumpSound");
        const hitSound = document.getElementById("hitSound");
        const hitEffect = document.getElementById("hitEffect");
        const gameOverText = document.getElementById("gameOverText");
        let isJumping = false;
        let isAlive = true;

        function jump() {
            if (isJumping || !isAlive) return;
            isJumping = true;
            jumpSound.currentTime = 0;
            jumpSound.play();
            character.classList.add("jump");
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 600);
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" || event.code === "ArrowUp") {
                jump();
            }
        });

        gameContainer.addEventListener("click", () => {
            jump();
        });

        const checkHit = setInterval(() => {
            if (!isAlive) return;

            const characterRect = character.getBoundingClientRect();
            const obstacleRect = obstacle.getBoundingClientRect();

            if (
                characterRect.right > obstacleRect.left &&
                characterRect.left < obstacleRect.right &&
                characterRect.bottom > obstacleRect.top
            ) {
                isAlive = false;
                hitSound.currentTime = 0;
                hitSound.play();
                
                hitEffect.style.backgroundColor = "rgba(255, 0, 0, 0.4)";
                setTimeout(() => {
                    hitEffect.style.backgroundColor = "rgba(255, 0, 0, 0)";
                }, 200);

                gameOverText.style.display = "block";
                
                setTimeout(() => {
                    location.reload(); // Restart the game
                }, 2000);
            }
        }, 10);
    </script>
</body>
