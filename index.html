<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Click Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .game-container {
            width: 300px;
            height: 300px;
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: background-color 0.5s;
        }

        #message {
            font-size: 2em;
            margin-bottom: 20px;
        }

        #timer {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameArea">
        <p id="message">منتظر چراغ سبز باشید</p>
        <p id="timer">0.000s</p>
    </div>

    <script>
        const gameArea = document.getElementById("gameArea");
        const message = document.getElementById("message");
        const timerDisplay = document.getElementById("timer");

        let startTime;
        let timeoutId;
        let isWaiting = true;

        function startGame() {
            isWaiting = true;
            message.textContent = "آماده باش...";
            timerDisplay.textContent = "0.000s";
            gameArea.style.backgroundColor = "#ff0000"; // Red
            
            const randomTime = Math.random() * 3000 + 2000; // 2 to 5 seconds
            timeoutId = setTimeout(() => {
                isWaiting = false;
                startTime = Date.now();
                message.textContent = "کلیک کنید!";
                gameArea.style.backgroundColor = "#00ff00"; // Green
            }, randomTime);
        }

        function endGame() {
            clearTimeout(timeoutId);
            if (isWaiting) {
                message.textContent = "زود کلیک کردید! باختید.";
                gameArea.style.backgroundColor = "#800080"; // Purple
            } else {
                const reactionTime = (Date.now() - startTime) / 1000;
                message.textContent = "شما بردید!";
                timerDisplay.textContent = `${reactionTime.toFixed(3)}s`;
                gameArea.style.backgroundColor = "#0000ff"; // Blue
            }
            setTimeout(startGame, 3000); // Restart after 3 seconds
        }

        gameArea.addEventListener("click", endGame);

        // Start the first round
        startGame();
    </script>
</body>
</html>
