<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Escape</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
        }

        .game-container {
            width: 400px;
            height: 600px;
            border: 2px solid #fff;
            position: relative;
            overflow: hidden;
            background: url('https://raw.githubusercontent.com/mdn/css-examples/main/css-background/stars.jpg') repeat-y;
            background-size: cover;
            animation: skyMove 20s linear infinite;
            cursor: crosshair;
        }

        @keyframes skyMove {
            from { background-position: 0 0; }
            to { background-position: 0 600px; }
        }

        #player {
            width: 40px;
            height: 60px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        #player .body {
            width: 100%;
            height: 100%;
            background-color: #e0f7fa;
            border-radius: 5px;
            box-shadow: 0 0 10px #e0f7fa, 0 0 20px #e0f7fa;
        }

        #player .wing {
            width: 80px;
            height: 15px;
            background-color: #b3e5fc;
            position: absolute;
            left: -20px;
            top: 25px;
            z-index: -1;
            border-radius: 5px;
            box-shadow: 0 0 5px #b3e5fc, 0 0 10px #b3e5fc;
        }

        .bullet {
            width: 5px;
            height: 20px;
            background-color: #ff5252;
            position: absolute;
            top: -20px;
            box-shadow: 0 0 5px #ff5252, 0 0 10px #ff5252;
        }

        .game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 100;
            color: white;
            font-size: 2em;
        }

        .restart-button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            border: 2px solid white;
            background-color: #2196F3;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .restart-button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="player">
            <div class="body"></div>
            <div class="wing"></div>
        </div>
    </div>
    <div id="gameOverScreen" class="game-over-screen">
        <div class="game-over-text">Game Over!</div>
        <button class="restart-button" onclick="location.reload()">Restart</button>
    </div>

    <script>
        const gameContainer = document.querySelector('.game-container');
        const player = document.getElementById('player');
        const gameOverScreen = document.getElementById('gameOverScreen');
        let isAlive = true;

        // Custom function to create sound without external files
        function playHitSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sawtooth';
            oscillator.frequency.value = 100;

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        document.addEventListener('mousemove', (e) => {
            if (!isAlive) return;
            const containerRect = gameContainer.getBoundingClientRect();
            let mouseX = e.clientX - containerRect.left;
            
            // Limit player movement within the game container
            let newLeft = mouseX - player.offsetWidth / 2;
            if (newLeft < 0) {
                newLeft = 0;
            } else if (newLeft + player.offsetWidth > containerRect.width) {
                newLeft = containerRect.width - player.offsetWidth;
            }
            player.style.left = newLeft + 'px';
        });

        function createBullet() {
            if (!isAlive) return;
            const bullet = document.createElement('div');
            bullet.classList.add('bullet');
            gameContainer.appendChild(bullet);

            const randomX = Math.random() * (gameContainer.offsetWidth - bullet.offsetWidth);
            bullet.style.left = randomX + 'px';

            let bulletY = -20;
            const bulletMoveInterval = setInterval(() => {
                if (!isAlive) {
                    clearInterval(bulletMoveInterval);
                    return;
                }
                bulletY += 5;
                bullet.style.top = bulletY + 'px';
                if (bulletY > gameContainer.offsetHeight) {
                    clearInterval(bulletMoveInterval);
                    if (gameContainer.contains(bullet)) {
                        gameContainer.removeChild(bullet);
                    }
                }
            }, 16);
            
            setTimeout(createBullet, Math.random() * 1000 + 500);
        }

        createBullet();
