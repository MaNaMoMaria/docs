<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #000;
        cursor: default;
    }

    .game-container {
        width: 100vw;
        height: 100vh;
        border: none;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle, #0f0a28, #1a237e, #4a148c);
        touch-action: none;
    }

    #game-title {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 2.5em;
        font-family: sans-serif;
        font-weight: bold;
        text-shadow: 0 0 10px #e0f7fa;
        z-index: 10;
        white-space: nowrap;
    }

    #player {
        width: 60px;
        height: 40px;
        background-color: #e0f7fa;
        position: absolute;
        top: 50%;
        left: 20px;
        transform: translateY(-50%);
        border-radius: 5px;
        box-shadow: 0 0 15px #e0f7fa, 0 0 30px #e0f7fa;
    }

    .bullet {
        width: 20px;
        height: 5px;
        background-color: #ff5252;
        position: absolute;
        right: -20px;
        box-shadow: 0 0 5px #ff5252, 0 0 10px #ff5252;
    }

    .game-over-screen {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        z-index: 100;
        color: white;
        font-size: 2em;
    }

    .game-over-text {
        font-size: 2em;
        font-weight: bold;
        color: white;
        text-shadow: 0 0 10px #ff5252;
    }

    .restart-button {
        padding: 15px 30px;
        font-size: 1.5em;
        cursor: pointer;
        border: 2px solid white;
        background-color: #2196F3;
        color: white;
        border-radius: 10px;
        transition: background-color 0.3s, transform 0.2s;
        margin-top: 30px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .restart-button:hover {
        background-color: #0d47a1;
        transform: scale(1.05);
    }
</style>

<div class="game-container">
    <div id="game-title">Galactic Escape</div>
    <div id="player"></div>
</div>
<div id="gameOverScreen" class="game-over-screen">
    <div class="game-over-text">Game Over!</div>
    <button class="restart-button" onclick="location.reload()">شروع مجدد</button>
</div>

<script>
    const gameContainer = document.querySelector('.game-container');
    const player = document.getElementById('player');
    const gameOverScreen = document.getElementById('gameOverScreen');
    let isAlive = true;

    // Mouse movement for horizontal game
    document.addEventListener('mousemove', (e) => {
        if (!isAlive) return;
        updatePlayerPosition(e.clientY);
    });

    // Touch movement for horizontal game
    document.addEventListener('touchmove', (e) => {
        if (!isAlive) return;
        e.preventDefault();
        const touchY = e.touches[0].clientY;
        updatePlayerPosition(touchY);
    });

    function updatePlayerPosition(y) {
        const containerRect = gameContainer.getBoundingClientRect();
        const newTop = y - containerRect.top - player.offsetHeight / 2;
        
        if (newTop >= 0 && newTop + player.offsetHeight <= containerRect.height) {
            player.style.top = newTop + 'px';
        }
    }

    function createBullet() {
        if (!isAlive) return;
        const bullet = document.createElement('div');
        bullet.classList.add('bullet');
        gameContainer.appendChild(bullet);

        const randomY = Math.random() * (gameContainer.offsetHeight - bullet.offsetHeight);
        bullet.style.top = randomY + 'px';

        let bulletX = gameContainer.offsetWidth;
        const bulletMoveInterval = setInterval(() => {
            if (!isAlive) {
                clearInterval(bulletMoveInterval);
                return;
            }
            bulletX -= 5;
            bullet.style.right = (gameContainer.offsetWidth - bulletX) + 'px';
            if (bulletX < 0) {
                clearInterval(bulletMoveInterval);
                if (gameContainer.contains(bullet)) {
                    gameContainer.removeChild(bullet);
                }
            }
        }, 16);
        
        setTimeout(createBullet, Math.random() * 1000 + 500);
    }

    createBullet();

    function checkCollision() {
        if (!isAlive) return;
        const playerRect = player.getBoundingClientRect();
        const bullets = document.querySelectorAll('.bullet');

        bullets.forEach(bullet => {
            const bulletRect = bullet.getBoundingClientRect();
            if (
                playerRect.top < bulletRect.bottom &&
                playerRect.bottom > bulletRect.top &&
                playerRect.left < bulletRect.right &&
                playerRect.right > bulletRect.left
            ) {
                isAlive = false;
                gameOverScreen.style.display = 'flex';
            }
        });
        requestAnimationFrame(checkCollision);
    }

    checkCollision();
</script>
