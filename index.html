<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Runner Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #87CEEB; /* Sky Blue */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .game-container {
            width: 800px;
            height: 300px;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to top, #4CAF50 50px, transparent 50px);
        }

        .cloud {
            position: absolute;
            background-color: #f0f0f0;
            top: 50px;
            height: 20px;
            width: 60px;
            border-radius: 10px;
            animation: cloudMove linear infinite;
        }

        .cloud.small {
            width: 40px;
            height: 15px;
            top: 80px;
        }

        @keyframes cloudMove {
            from { right: -100px; }
            to { right: 900px; }
        }

        #character {
            width: 30px;
            height: 50px;
            position: absolute;
            bottom: 50px;
            left: 150px;
            z-index: 2;
            transition: bottom 0.3s ease-out;
        }
        
        #character .head, #character .body, #character .leg {
            position: absolute;
        }
        #character .head {
            width: 20px;
            height: 20px;
            background-color: #FFC300;
            border-radius: 50%;
            top: -10px;
            left: 5px;
        }
        #character .body {
            width: 30px;
            height: 30px;
            background-color: #2196F3;
            top: 10px;
        }
        #character .leg {
            width: 10px;
            height: 20px;
            background-color: #FF5733;
            top: 40px;
        }
        #character .leg1 { left: 5px; }
        #character .leg2 { left: 15px; }

        .obstacle {
            width: 25px;
            height: 40px;
            background-color: #F44336;
            border-radius: 5px;
            position: absolute;
            bottom: 50px;
            z-index: 1;
        }
        
        .jump {
            animation: jump 0.6s ease-out;
        }

        @keyframes jump {
            0%, 100% { bottom: 50px; }
            50% { bottom: 200px; }
        }

        .game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 100;
        }

        .game-over-text {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .restart-button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            border: 2px solid white;
            background-color: #2196F3;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .restart-button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="character">
            <div class="head"></div>
            <div class="body"></div>
            <div class="leg leg1"></div>
            <div class="leg leg2"></div>
        </div>
        <div class="cloud" style="top: 60px; left: 100px; animation-duration: 15s;"></div>
        <div class="cloud small" style="top: 90px; left: 400px; animation-duration: 20s;"></div>
        <div class="cloud" style="top: 70px; left: 700px; animation-duration: 18s;"></div>
    </div>

    <div id="gameOverScreen" class="game-over-screen">
        <div class="game-over-text">Game Over!</div>
        <div class="game-over-text">Try Again?</div>
        <button class="restart-button" onclick="location.reload()">Restart</button>
    </div>

    <script>
        const character = document.getElementById("character");
        const gameContainer = document.querySelector(".game-container");
        const gameOverScreen = document.getElementById("gameOverScreen");
        let isJumping = false;
        let isAlive = true;

        function playSound(frequency, duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration / 1000);
        }

        function createObstacle() {
            if (!isAlive) return;

            const obstacle = document.createElement("div");
            obstacle.classList.add("obstacle");
            gameContainer.appendChild(obstacle);

            const speed = 2;
            let right = -25;
            const moveInterval = setInterval(() => {
                if (!isAlive) {
                    clearInterval(moveInterval);
                    if (gameContainer.contains(obstacle)) {
                        gameContainer.removeChild(obstacle);
                    }
                    return;
                }

                right += speed;
                obstacle.style.right = right + "px";

                if (right > gameContainer.offsetWidth) {
                    clearInterval(moveInterval);
                    if (gameContainer.contains(obstacle)) {
                        gameContainer.removeChild(obstacle);
                    }
                    setTimeout(createObstacle, Math.random() * 2000 + 1000);
                }
            }, 10);
        }

        createObstacle();

        function jump() {
            if (isJumping || !isAlive) return;
            isJumping = true;
            playSound(440, 200);
            character.classList.add("jump");
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 600);
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" || event.code === "ArrowUp") {
                jump();
            }
        });

        gameContainer.addEventListener("click", () => {
            jump();
        });

        const checkCollision = setInterval(() => {
            if (!isAlive) return;
