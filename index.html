<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #3b5998;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }
        .game-container {
            width: 800px;
            height: 300px;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #F0F8FF);
        }
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #2e8b57;
            animation: groundMove 10s linear infinite;
        }
        @keyframes groundMove {
            from { background-position-x: 0; }
            to { background-position-x: -800px; }
        }
        #character {
            width: 30px;
            height: 50px;
            position: absolute;
            bottom: 50px;
            left: 50px;
            transition: bottom 0.3s ease-out;
            animation: run 0.6s steps(2) infinite;
        }
        @keyframes run {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(0.9); }
            100% { transform: scaleY(1); }
        }
        .head {
            width: 25px;
            height: 25px;
            background-color: #FF5733;
            border-radius: 50%;
            position: absolute;
            top: -15px;
            left: 2px;
        }
        .body {
            width: 30px;
            height: 40px;
            background-color: #FF5733;
        }
        .leg {
            width: 10px;
            height: 15px;
            background-color: #FFC300;
            position: absolute;
            bottom: -15px;
        }
        .leg1 { left: 5px; }
        .leg2 { left: 15px; }

        .obstacle {
            width: 25px;
            height: 40px;
            background-color: #F44336;
            border-radius: 5px;
            position: absolute;
            bottom: 50px;
            right: -25px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .jump {
            animation: jump 0.6s ease-out;
        }
        @keyframes jump {
            0%, 100% { bottom: 50px; }
            50% { bottom: 200px; }
        }
        .game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        .game-over-text {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .restart-button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            border: 2px solid white;
            background-color: #2196F3;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .restart-button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <audio id="jumpSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-video-game-jump-223.mp3" preload="auto"></audio>
    <audio id="hitSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-bling-2000.mp3" preload="auto"></audio>

    <div class="game-container">
        <div class="ground"></div>
        <div id="character">
            <div class="head"></div>
            <div class="body"></div>
            <div class="leg leg1"></div>
            <div class="leg leg2"></div>
        </div>
    </div>
    <div id="gameOverScreen" class="game-over-screen">
        <div class="game-over-text">Game Over!</div>
        <div class="game-over-text">Try Again?</div>
        <button class="restart-button" onclick="location.reload()">Restart</button>
    </div>

    <script>
        const character = document.getElementById("character");
        const gameContainer = document.querySelector(".game-container");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const jumpSound = document.getElementById("jumpSound");
        const hitSound = document.getElementById("hitSound");
        let isJumping = false;
        let isAlive = true;

        function createObstacle() {
            if (!isAlive) return;
            
            const obstacle = document.createElement("div");
            obstacle.classList.add("obstacle");
            gameContainer.appendChild(obstacle);
            
            const randomDuration = Math.random() * 1.5 + 1.5;
            obstacle.style.animation = `obstacleMove ${randomDuration}s linear infinite`;

            setTimeout(() => {
                if (isAlive && gameContainer.contains(obstacle)) {
                    gameContainer.removeChild(obstacle);
                    createObstacle();
                }
            }, randomDuration * 1000);
        }

        createObstacle();

        function jump() {
            if (isJumping || !isAlive) return;
            isJumping = true;
            jumpSound.currentTime = 0;
            jumpSound.play();
            character.classList.add("jump");
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 600);
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" || event.code === "ArrowUp") {
                jump();
            }
        });

        gameContainer.addEventListener("click", () => {
            jump();
        });

        const checkCollision = setInterval(() => {
            if (!isAlive) return;

            const obstacles = document.querySelectorAll(".obstacle");
            obstacles.forEach(obstacle => {
                const characterRect = character.getBoundingClientRect();
                const obstacleRect = obstacle.getBoundingClientRect();

                if (
                    characterRect.right > obstacleRect.left &&
                    characterRect.left < obstacleRect.right &&
                    characterRect.bottom > obstacleRect.top
                ) {
                    isAlive = false;
                    hitSound.currentTime = 0;
                    hitSound.play();
                    gameOverScreen.style.display = "flex";

                    // Stop all animations on collision
                    document.querySelectorAll('.obstacle').forEach(obs => {
                        obs.style.animationPlayState = 'paused';
                    });
                    document.querySelector('.ground').style.animationPlayState = 'paused';
                    character.style.animationPlayState = 'paused';
                    clearInterval(checkCollision);
                }
            });
        }, 10);
    </script>
</body>
</html>
