<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #87CEEB; /* Sky blue */
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }
        .game-container {
            width: 800px;
            height: 300px;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            background-color: #87CEEB;
        }
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #2e8b57;
            box-shadow: 
                0 0 0 2px #333,
                0 0 0 4px #555,
                0 0 0 6px #777,
                0 0 0 8px #999,
                0 0 0 10px #bbb;
        }
        #character {
            width: 32px;
            height: 48px;
            position: absolute;
            bottom: 50px;
            left: 150px;
            z-index: 2;
            transition: bottom 0.3s ease-out;
            background-color: #333;
            box-shadow: 
                4px 0px 0 0 #333, /* Head */
                8px 0px 0 0 #333,
                12px 0px 0 0 #333,
                16px 0px 0 0 #333,
                20px 0px 0 0 #333,
                24px 0px 0 0 #333,
                -4px 4px 0 0 #333,
                28px 4px 0 0 #333,
                -4px 8px 0 0 #333,
                28px 8px 0 0 #333,
                0px 12px 0 0 #333,
                4px 12px 0 0 #333,
                8px 12px 0 0 #333,
                12px 12px 0 0 #333,
                16px 12px 0 0 #333,
                20px 12px 0 0 #333,
                24px 12px 0 0 #333,
                28px 12px 0 0 #333,
                32px 12px 0 0 #333,
                36px 12px 0 0 #333,
                40px 12px 0 0 #333,
                44px 12px 0 0 #333,
                48px 12px 0 0 #333,
                52px 12px 0 0 #333,
                56px 12px 0 0 #333,
                60px 12px 0 0 #333,
                64px 12px 0 0 #333,
                68px 12px 0 0 #333,
                72px 12px 0 0 #333,
                76px 12px 0 0 #333,
                80px 12px 0 0 #333;
            animation: run 0.6s steps(2) infinite;
        }
        @keyframes run {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(0.9); }
            100% { transform: scaleY(1); }
        }
        .obstacle {
            width: 30px;
            height: 40px;
            background-color: #FFC300;
            border-radius: 5px;
            position: absolute;
            bottom: 50px;
            z-index: 1;
        }
        .jump {
            animation: jump 0.6s ease-out;
        }
        @keyframes jump {
            0%, 100% { bottom: 50px; }
            50% { bottom: 200px; }
        }
        .game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 100;
        }
        .game-over-text {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .restart-button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            border: 2px solid white;
            background-color: #2196F3;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .restart-button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>
    <audio id="jumpSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-video-game-jump-223.mp3" preload="auto"></audio>
    <audio id="hitSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-bling-2000.mp3" preload="auto"></audio>

    <div class="game-container">
        <div class="ground"></div>
        <div id="character"></div>
    </div>
    <div id="gameOverScreen" class="game-over-screen">
        <div class="game-over-text">Game Over!</div>
        <div class="game-over-text">Try Again?</div>
        <button class="restart-button" onclick="location.reload()">Restart</button>
    </div>

    <script>
        const character = document.getElementById("character");
        const gameContainer = document.querySelector(".game-container");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const jumpSound = document.getElementById("jumpSound");
        const hitSound = document.getElementById("hitSound");
        let isJumping = false;
        let isAlive = true;

        function jump() {
            if (isJumping || !isAlive) return;
            isJumping = true;
            jumpSound.currentTime = 0;
            jumpSound.play();
            character.style.bottom = '200px';
            setTimeout(() => {
                character.style.bottom = '50px';
                isJumping = false;
            }, 600);
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" || event.code === "ArrowUp") {
                jump();
            }
        });

        gameContainer.addEventListener("click", () => {
            jump();
        });

        // Obstacle management
        const obstacleDuration = 2000;
        let lastObstacleTime = 0;

        function createObstacle() {
            if (!isAlive) return;

            const obstacle = document.createElement('div');
            obstacle.classList.add('obstacle');
            gameContainer.appendChild(obstacle);

            let obstacleRight = -40;
            const obstacleMoveInterval = setInterval(() => {
                if (!isAlive) {
                    clearInterval(obstacleMoveInterval);
                    return;
                }
                obstacleRight += 10;
                obstacle.style.right = obstacleRight + 'px';
                if (obstacleRight > 800) {
                    clearInterval(obstacleMoveInterval);
                    gameContainer.removeChild(obstacle);
                }
            }, 20);
        }
        
        setInterval(() => {
            if (isAlive) {
                createObstacle();
            }
        }, Math.random() * 2000 + 1000);

        // Collision detection
        const checkCollision = setInterval(() => {
            if (!isAlive) return;
            
            const obstacles = document.querySelectorAll('.obstacle');
            obstacles.forEach(obstacle => {
                const characterRect = character.getBoundingClientRect();
                const obstacleRect = obstacle.getBoundingClientRect();

                if (
                    characterRect.right > obstacleRect.left &&
                    characterRect.left < obstacleRect.right &&
                    characterRect.bottom > obstacleRect.top
                ) {
                    isAlive = false;
                    hitSound.currentTime = 0;
                    hitSound.play();
                    gameOverScreen.style.display = "flex";
                    clearInterval(checkCollision);
                }
            });
        }, 10);
    </script>
</body>
</html>
