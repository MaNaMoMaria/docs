<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #000;
        cursor: default;
    }

    .game-container {
        width: 100vw;
        height: 100vh;
        border: none;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle, #0f0a28, #1a237e, #4a148c);
        touch-action: none;
    }
    
    .light-ray {
        position: absolute;
        background-color: white;
        opacity: 0.1;
        animation: ray-move 10s linear infinite;
    }

    .light-ray:nth-child(1) {
        width: 200vw;
        height: 5px;
        top: 10vh;
        animation-delay: 0s;
    }

    .light-ray:nth-child(2) {
        width: 150vw;
        height: 3px;
        top: 40vh;
        animation-delay: 3s;
    }

    .light-ray:nth-child(3) {
        width: 180vw;
        height: 4px;
        top: 70vh;
        animation-delay: 6s;
    }

    @keyframes ray-move {
        from {
            transform: translateX(-100vw);
        }
        to {
            transform: translateX(100vw);
        }
    }

    #game-title {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 2.5em;
        font-family: sans-serif;
        font-weight: bold;
        text-shadow: 0 0 10px #e0f7fa;
        z-index: 10;
        white-space: nowrap;
    }

    #player {
        width: 60px;
        height: 40px;
        background-color: #2EFFF2;
        position: absolute;
        top: 50%;
        left: 20px;
        transform: translateY(-50%);
        border-radius: 5px;
        box-shadow: 0 0 15px #e0f7fa, 0 0 30px #e0f7fa;
        transition: opacity 1s;
    }

    .bullet {
        width: 40px;
        height: 10px;
        background-color: #5DADE2;
        position: absolute;
        right: -40px;
        box-shadow: 0 0 15px #F4D03F, 0 0 30px #F4D03F;
        animation: pulse 1s infinite alternate;
    }
    
    @keyframes pulse {
        from {
            box-shadow: 0 0 15px #F4D03F, 0 0 30px #F4D03F;
        }
        to {
            box-shadow: 0 0 25px #FF7F50, 0 0 50px #FF7F50;
        }
    }

    .game-over-screen {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        z-index: 100;
        color: white;
        font-size: 2em;
    }

    .game-over-text {
        font-size: 2em;
        font-weight: bold;
        color: white;
        text-shadow: 0 0 10px #ff5252;
    }

    .restart-button {
        padding: 15px 30px;
        font-size: 1.5em;
        cursor: pointer;
        border: 2px solid white;
        background-color: #2196F3;
        color: white;
        border-radius: 10px;
        transition: background-color 0.3s, transform 0.2s;
        margin-top: 30px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .restart-button:hover {
        background-color: #0d47a1;
        transform: scale(1.05);
    }

    #flash-effect {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: white;
        opacity: 0;
        z-index: 1000;
        pointer-events: none;
    }
</style>

<div class="game-container">
    <div id="game-title">Galactic Escape</div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div id="player"></div>
    <div id="flash-effect"></div>
</div>
<div id="gameOverScreen" class="game-over-screen">
    <div class="game-over-text">Game Over!</div>
    <button class="restart-button" onclick="location.reload()">Restart</button>
</div>

<script>
    const gameContainer = document.querySelector('.game-container');
    const player = document.getElementById('player');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const flashEffect = document.getElementById('flash-effect');
    let isAlive = true;

    // Create an AudioContext for sound generation
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function playCollisionSound() {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.type = 'sawtooth';
        oscillator.frequency.value = 100;
        gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
        oscillator.stop(audioContext.currentTime + 0.5);
    }

    // Mouse movement for horizontal game
    document.addEventListener('mousemove', (e) => {
        if (!isAlive) return;
        updatePlayerPosition(e.clientY);
    });

    // Touch movement for horizontal game
    document.addEventListener('touchmove', (e) => {
        if (!isAlive) return;
        e.preventDefault();
        const touchY = e.touches[0].clientY;
        updatePlayerPosition(touchY);
    });

    function updatePlayerPosition(y) {
        const containerRect = gameContainer.getBoundingClientRect();
        const newTop = y - containerRect.top - player.offsetHeight / 2;
        
        if (newTop >= 0 && newTop + player.offsetHeight <= containerRect.height) {
            player.style.top = newTop + 'px';
        }
    }

    function createBullet() {
        if (!isAlive) return;
        const bullet = document.createElement('div');
        bullet.classList.add('bullet');
        gameContainer.appendChild(bullet);

        const randomY = Math.random() * (gameContainer.offsetHeight - bullet.offsetHeight);
        bullet.style.top = randomY + 'px';

        let bulletX = gameContainer.offsetWidth;
        const bulletSpeed = 10;
        const bulletMoveInterval = setInterval(() => {
            if (!isAlive) {
                clearInterval(bulletMoveInterval);
                return;
            }
            bulletX -= bulletSpeed;
            bullet.style.right = (gameContainer.offsetWidth - bulletX) + 'px';
            if (bulletX < 0) {
                clearInterval(bulletMoveInterval);
                if (gameContainer.contains(bullet)) {
                    gameContainer.removeChild(bullet);
                }
            }
        }, 16);
        
        setTimeout(createBullet, Math.random() * 250 + 250);
    }

    createBullet();

    function checkCollision() {
        if (!isAlive) return;
        const playerRect = player.getBoundingClientRect();
        const bullets = document.querySelectorAll('.bullet');

        bullets.forEach(bullet => {
            const bulletRect = bullet.getBoundingClientRect();
            if (
                playerRect.top < bulletRect.bottom &&
                playerRect.bottom > bulletRect.top &&
                playerRect.left < bulletRect.right &&
                playerRect.right > bulletRect.left
            ) {
                isAlive = false;
                player.style.opacity = 0; // Fade out the player
                gameOverScreen.style.display = 'flex';
                playCollisionSound(); // Play sound
                flashEffect.style.opacity = 1; // Show flash
                setTimeout(() => {
                    flashEffect.style.opacity = 0;
                }, 100);
            }
        });
        requestAnimationFrame(checkCollision);
    }

    checkCollision();
</script>
