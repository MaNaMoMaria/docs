<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            overflow: hidden;
        }
        .game-container {
            width: 800px;
            height: 300px;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            background: url('https://i.ibb.co/6803h7h/background-pixel.png');
            background-size: auto 100%;
            animation: backgroundMove 10s linear infinite;
        }
        @keyframes backgroundMove {
            from { background-position-x: 0; }
            to { background-position-x: -800px; }
        }
        #character {
            width: 50px;
            height: 50px;
            background: url('https://i.ibb.co/3sX8sYp/player-pixel.png');
            background-size: contain;
            position: absolute;
            bottom: 0;
            left: 50px;
            transition: bottom 0.3s ease-out;
        }
        #obstacle {
            width: 40px;
            height: 40px;
            background: url('https://i.ibb.co/BPsS724/obstacle-pixel.png');
            background-size: contain;
            position: absolute;
            bottom: 0;
            right: -40px;
            animation: obstacleMove 2s linear infinite;
        }
        @keyframes obstacleMove {
            0% { right: -40px; }
            100% { right: 100%; }
        }
        .jump {
            animation: jump 0.5s ease-out;
        }
        @keyframes jump {
            0%, 100% { bottom: 0; }
            50% { bottom: 120px; }
        }
    </style>
</head>
<body>
    <audio id="jumpSound" src="https://freesound.org/data/previews/275/275069_5121406-lq.mp3" preload="auto"></audio>
    <audio id="hitSound" src="https://freesound.org/data/previews/320/320655_2271836-lq.mp3" preload="auto"></audio>

    <div class="game-container">
        <div id="character"></div>
        <div id="obstacle"></div>
    </div>

    <script>
        const character = document.getElementById("character");
        const obstacle = document.getElementById("obstacle");
        const gameContainer = document.querySelector(".game-container");
        const jumpSound = document.getElementById("jumpSound");
        const hitSound = document.getElementById("hitSound");
        let isJumping = false;

        function jump() {
            if (isJumping) return;
            isJumping = true;
            jumpSound.currentTime = 0;
            jumpSound.play();
            character.classList.add("jump");
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 500);
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" || event.code === "ArrowUp") {
                jump();
            }
        });

        gameContainer.addEventListener("click", () => {
            jump();
        });

        const checkCollision = setInterval(() => {
            const characterBottom = parseInt(window.getComputedStyle(character).getPropertyValue("bottom"));
            const obstacleRight = parseInt(window.getComputedStyle(obstacle).getPropertyValue("right"));

            if (obstacleRight > 700 && obstacleRight < 760 && characterBottom <= 40) {
                hitSound.currentTime = 0;
                hitSound.play();
                alert("Game Over! Try again.");
                location.reload();
            }
        }, 10);
    </script>
</body>
</html>
